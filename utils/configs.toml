[diffusion_params]
num_timesteps = 64
scheduler='power_mean_per_column'      # 'power_mean', 'power_mean_unified', 'power_mean_per_column'
cat_scheduler='log_linear_per_column'        # 'log_linear', 'log_linear_unified', 'log_linear_per_column'
noise_dist='uniform_t'       #'uniform_t' or 'log_norm'

[diffusion_params.sampler_params]
stochastic_sampler = true
second_order_correction = false

[diffusion_params.edm_params]
precond = true
sigma_data = 1.0
net_conditioning = "sigma"
# Floor sigma only in EDM loss weight (not in precond). At sigma≈0.002, unclamped weight ~(sigma_data/sigma)^2 ~1e5+;
# can destabilize bf16 LLM+diffusion joint training. Set 0 to disable (original EDM weighting).
weight_sigma_floor = 0.01

[diffusion_params.noise_dist_params]
P_mean = -1.2
P_std = 1.2

[diffusion_params.noise_schedule_params]
sigma_min = 0.002
sigma_max = 80
rho = 7
eps_max = 1e-3
eps_min = 1e-5
rho_init = 7.0
rho_offset = 5.0
k_init=-6.0
k_offset=1.0
